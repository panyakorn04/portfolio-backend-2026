Name: portfolio-api
Host: 0.0.0.0
Port: 8888

# Timeout in milliseconds for requests. Local Ollama inference can take longer
# than normal CRUD handlers, so keep this aligned with the Ollama client timeout.
Timeout: 120000

# The built-in go-zero request logger may dump request headers/body on 5xx.
# Keep tracing/metrics enabled, but use the application's sanitized request logger.
Middlewares:
  Log: false

# CORS: frontend origin(s) allowed to call this API with credentials.
CorsOrigins:
  - http://localhost:3000
  - https://panyakorn.com
  - https://www.panyakorn.com
  - https://ai.panyakorn.com

# Public site URL. Used to decide whether the session cookie should be Secure.
SiteURL: ${NEXT_PUBLIC_SITE_URL}

# Supabase REST source for all persistence.
# Use the service role key on the backend for admin writes/session/contact writes.
SupabaseURL: ${NEXT_PUBLIC_SUPABASE_URL}
SupabasePublishableKey: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
SupabaseServiceRoleKey: ${SUPABASE_SERVICE_ROLE_KEY}

# Optional Redis cache for public article GET responses.
RedisURL: ${REDIS_URL}
ArticleCacheTTLSeconds: ${ARTICLE_CACHE_TTL_SECONDS}
# Enable only behind a trusted proxy that overwrites forwarded client-IP headers.
TrustProxy: ${TRUST_PROXY}

# Outbound webhook for contact submissions (optional).
ContactWebhookURL: ${CONTACT_WEBHOOK_URL}
ContactWebhookSecret: ${CONTACT_WEBHOOK_SECRET}

# Static bearer tokens and Studio credential encryption (optional).
AdminApiToken: ${ADMIN_API_TOKEN}
InternalApiToken: ${INTERNAL_API_TOKEN}
StudioCredentialEncryptionKey: ${STUDIO_CREDENTIAL_ENCRYPTION_KEY}
StudioWebhookSigningKey: ${STUDIO_WEBHOOK_SIGNING_KEY}

# AI provider config (optional).
AiProvider: ${AI_PROVIDER}
AiApiKey: ${AI_API_KEY}
OllamaBaseURL: ${OLLAMA_BASE_URL}
OllamaModel: ${OLLAMA_MODEL}
OllamaAllowedModels: ${OLLAMA_ALLOWED_MODELS}
AISkillsDir: ${AI_SKILLS_DIR}

# Public portfolio assistant anonymous backend sessions.
# Keep the secret backend-only; it is used to HMAC browser visitor ids before DB writes.
PortfolioChatVisitorSecret: ${PORTFOLIO_CHAT_VISITOR_SECRET}
PortfolioChatSessionTTLHours: 2160
PortfolioChatMaxStoredMessages: 100

Log:
  ServiceName: portfolio-api
  Mode: console
  Encoding: json
  Level: info
  Stat: true
  MaxContentLength: 8192
