name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: Deploy this commit or roll back to an existing SHA image
        type: choice
        options: [deploy, rollback]
        default: deploy
      image_sha:
        description: Full 40-character image commit SHA (required for rollback)
        type: string
        required: false
permissions:
  contents: read

env:
  IMAGE_REPOSITORY: ${{ vars.BACKEND_IMAGE_REPOSITORY }}

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      app_changed: ${{ steps.classify.outputs.app_changed }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
      - name: Classify deploy impact
        id: classify
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = pull_request ] || [ "$GITHUB_EVENT_NAME" = workflow_dispatch ]; then
            app_changed=true
          elif [ -z "$BEFORE_SHA" ] || ! git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            app_changed=true
          else
            app_changed="$(git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA" | bash .github/scripts/classify-deploy-change.sh)"
          fi
          echo "app_changed=$app_changed" >> "$GITHUB_OUTPUT"

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: portfolio_migrations
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d portfolio_migrations"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/portfolio_migrations?sslmode=disable
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Scan committed content for secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        run: |
          set -euo pipefail
          test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }
      - name: Vet
        run: go vet ./...
      - name: Verify module files are tidy
        run: go mod tidy -diff
      - name: Scan reachable Go vulnerabilities
        run: go tool govulncheck ./...
      - name: Test with race detector
        run: go test ./... -race -count=1 -shuffle=on
      - name: Enforce critical handler coverage
        run: python3 .github/scripts/check_handler_coverage.py
      - name: Test production log monitor
        run: python3 .github/scripts/test_monitor_production_logs.py
      - name: Test backend-only Supabase table contract
        run: python3 .github/scripts/test_migration_security.py
      - name: Verify immutable migration manifest
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          if [ -n "$BASE_REF" ]; then
            git fetch --no-tags origin "$BASE_REF"
            python3 .github/scripts/migration-ledger.py verify --base-ref "origin/$BASE_REF"
          else
            python3 .github/scripts/migration-ledger.py verify
          fi
      - name: Test migration ledger tooling
        run: |
          python3 .github/scripts/test_migration_ledger.py
          python3 .github/scripts/test_verify_production_migrations.py
      - name: Smoke test all migrations on PostgreSQL
        run: bash .github/scripts/smoke-test-migrations.sh
      - name: Smoke test hardened Alloy Docker discovery
        run: bash .github/scripts/smoke-test-alloy.sh
      - name: Test deploy change classifier
        run: bash .github/scripts/classify-deploy-change.sh --self-test
      - name: Test release freshness gate
        run: bash .github/scripts/test_release_freshness.sh
      - name: Test deploy preflight image selection
        run: |
          bash .github/scripts/test_deploy_preflight.sh
          bash deploy/test-deploy-compose-service.sh
      - name: Validate deployment scripts
        run: >-
          bash -n
          deploy/deploy-compose-service.sh
          deploy/test-deploy-compose-service.sh
          deploy/install-grafana-alloy.sh
          .github/scripts/smoke-test-image.sh
          .github/scripts/deploy-preflight.sh
          .github/scripts/test_deploy_preflight.sh
          .github/scripts/reconcile-rollout.sh
          .github/scripts/notify-deploy.sh
          .github/scripts/classify-deploy-change.sh
          .github/scripts/check-release-freshness.sh
          .github/scripts/test_release_freshness.sh
          .github/scripts/smoke-test-migrations.sh
          .github/scripts/smoke-test-alloy.sh
      - name: Validate Python tooling
        run: >-
          python3 -m py_compile
          .github/scripts/check_handler_coverage.py
          .github/scripts/migration-ledger.py
          .github/scripts/monitor-production-logs.py
          .github/scripts/test_migration_ledger.py
          .github/scripts/test_verify_production_migrations.py
          deploy/verify-production-migrations.py
      - name: Lint GitHub Actions workflows
        env:
          GOWORK: "off"
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7 .github/workflows/*.yml

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          args: --timeout=5m

  image:
    if: >-
      (github.event_name != 'workflow_dispatch' || inputs.action != 'rollback') &&
      (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.app_changed == 'true')
    needs: [changes, validate, lint]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Validate image configuration
        run: |
          set -euo pipefail
          test -n "$IMAGE_REPOSITORY"
          [[ "$IMAGE_REPOSITORY" == ghcr.io/* ]]
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ env.IMAGE_REPOSITORY }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=portfolio-backend-2026
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan exact image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REPOSITORY }}:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
      - name: Smoke test exact image
        run: bash .github/scripts/smoke-test-image.sh "${IMAGE_REPOSITORY}:${GITHUB_SHA}"
      - name: Publish verified image
        if: github.event_name != 'pull_request'
        run: docker push "${IMAGE_REPOSITORY}:${GITHUB_SHA}"

  deploy-preflight:
    if: >-
      always() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main' &&
      needs.validate.result == 'success' && needs.lint.result == 'success' &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.app_changed == 'true') &&
      (needs.image.result == 'success' ||
       (github.event_name == 'workflow_dispatch' && inputs.action == 'rollback' && needs.image.result == 'skipped'))
    needs: [changes, validate, lint, image]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      packages: read
    outputs:
      release_image: ${{ steps.preflight.outputs.release_image }}
      previous_image: ${{ steps.preflight.outputs.previous_image }}
      rollback_worthy: ${{ steps.preflight.outputs.rollback_worthy }}
      migrations: ${{ steps.preflight.outputs.migrations }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Run production rollout preflight
        id: preflight
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTION: ${{ inputs.action }}
          RELEASE_SHA: ${{ github.sha }}
          REQUESTED_IMAGE_SHA: ${{ inputs.image_sha }}
          BEFORE_SHA: ${{ github.event.before }}
          DEPLOY_HEALTH_URL: ${{ vars.BACKEND_HEALTH_URL }}
          DEPLOY_COMPOSE_FILES: ${{ vars.BACKEND_COMPOSE_FILES }}
          DEPLOY_SERVICE: ${{ vars.BACKEND_COMPOSE_SERVICE }}
          DEPLOY_IMAGE_VARIABLE: ${{ vars.BACKEND_IMAGE_VARIABLE }}
        run: bash .github/scripts/deploy-preflight.sh

  deploy:
    name: Deploy production (approval required)
    if: always() && needs.deploy-preflight.result == 'success'
    needs: [deploy-preflight]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: production-backend-deploy
      cancel-in-progress: false
    environment:
      name: production
      url: ${{ vars.BACKEND_HEALTH_URL }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Refuse a superseded approved release
        env:
          ACTION: ${{ github.event_name == 'workflow_dispatch' && inputs.action || 'deploy' }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          CURRENT_MAIN_SHA="$(git rev-parse origin/main)" \
            bash .github/scripts/check-release-freshness.sh
      - name: Prepare pinned SSH host identity
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          test -n "$VPS_SSH_KEY"
          test -n "$VPS_KNOWN_HOSTS"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          test -n "$VPS_HOST"
          ssh-keygen -F "$VPS_HOST" -f ~/.ssh/known_hosts >/dev/null
      - name: Verify live production migration ledger
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_ENV_FILE: ${{ vars.BACKEND_ENV_FILE }}
          ACTION: ${{ github.event_name == 'workflow_dispatch' && inputs.action || 'deploy' }}
          REQUESTED_IMAGE_SHA: ${{ inputs.image_sha }}
        run: |
          set -euo pipefail
          release_sha="$GITHUB_SHA"
          manifest_sha="$GITHUB_SHA"
          if [ "$ACTION" = rollback ]; then
            release_sha="$REQUESTED_IMAGE_SHA"
            # Pre-ledger rollback commits have no manifest. Verify the live database
            # against the current reviewed ledger while deploying the older image.
            manifest_sha="$GITHUB_SHA"
            verify_mode=rollback
          else
            verify_mode=forward
          fi
          [[ "$release_sha" =~ ^[0-9a-f]{40}$ ]]
          [[ "$manifest_sha" =~ ^[0-9a-f]{40}$ ]]
          env_file="${DEPLOY_ENV_FILE:-/opt/apps/.env}"
          bundle_dir="$(mktemp -d)"
          trap 'rm -rf "$bundle_dir"' EXIT
          cp deploy/verify-production-migrations.py "$bundle_dir/verify.py"
          git show "$manifest_sha:migrations/manifest.sha256" > "$bundle_dir/manifest.sha256"
          # shellcheck disable=SC2016 # Variables expand on the remote host, not in this runner shell.
          remote_script='tmp=$(mktemp -d); trap '\''rm -rf "$tmp"'\'' EXIT; tar -xzf - -C "$tmp"; python3 "$tmp/verify.py" --manifest "$tmp/manifest.sha256" --env-file "$DEPLOY_ENV_FILE" --mode "$VERIFY_MODE"'
          printf -v remote_command 'DEPLOY_ENV_FILE=%q VERIFY_MODE=%q bash -c %q' "$env_file" "$verify_mode" "$remote_script"
          tar -C "$bundle_dir" -czf - verify.py manifest.sha256 | \
            ssh -i ~/.ssh/deploy_key \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=30 \
              "${VPS_USER}@${VPS_HOST}" "$remote_command"
      - name: Recheck release freshness before production mutation
        env:
          ACTION: ${{ github.event_name == 'workflow_dispatch' && inputs.action || 'deploy' }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          CURRENT_MAIN_SHA="$(git rev-parse origin/main)" \
            bash .github/scripts/check-release-freshness.sh
      - name: Notify deployment start
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DEPLOY_IMAGE: ${{ needs.deploy-preflight.outputs.release_image }}
          PREVIOUS_IMAGE: ${{ needs.deploy-preflight.outputs.previous_image }}
        run: bash .github/scripts/notify-deploy.sh start
      - name: Deploy exact image and run sustained health gate
        id: rollout
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_IMAGE: ${{ needs.deploy-preflight.outputs.release_image }}
          ROLLBACK_IMAGE: ${{ needs.deploy-preflight.outputs.previous_image }}
          DEPLOY_HEALTH_URL: ${{ vars.BACKEND_HEALTH_URL }}
          DEPLOY_COMPOSE_FILES: ${{ vars.BACKEND_COMPOSE_FILES }}
          DEPLOY_SERVICE: ${{ vars.BACKEND_COMPOSE_SERVICE }}
          DEPLOY_IMAGE_VARIABLE: ${{ vars.BACKEND_IMAGE_VARIABLE }}
          ROLLOUT_ID: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          deploy_log="$RUNNER_TEMP/deploy-output.log"
          : > "$deploy_log"
          echo "log_file=$deploy_log" >> "$GITHUB_OUTPUT"
          remote_env=$(printf 'DEPLOY_IMAGE=%q ROLLBACK_IMAGE=%q IMAGE_VARIABLE=%q SERVICE=%q HEALTH_URL=%q COMPOSE_FILES=%q GHCR_USERNAME=%q ROLLOUT_ID=%q' \
            "$DEPLOY_IMAGE" "$ROLLBACK_IMAGE" "$DEPLOY_IMAGE_VARIABLE" "$DEPLOY_SERVICE" "$DEPLOY_HEALTH_URL" "$DEPLOY_COMPOSE_FILES" "$GHCR_USERNAME" "$ROLLOUT_ID")
          for attempt in 1 2 3; do
            set +e
            { printf '%s\n' "$GHCR_TOKEN"; cat deploy/deploy-compose-service.sh; } | \
              ssh -i ~/.ssh/deploy_key \
                -o BatchMode=yes \
                -o StrictHostKeyChecking=yes \
                -o ConnectTimeout=60 \
                -o ServerAliveInterval=15 \
                -o ServerAliveCountMax=4 \
                "${VPS_USER}@${VPS_HOST}" \
                "IFS= read -r GHCR_TOKEN; export GHCR_TOKEN; ${remote_env} bash -se" 2>&1 | tee -a "$deploy_log"
            pipeline_status=("${PIPESTATUS[@]}")
            set -e
            ssh_status="${pipeline_status[1]}"
            if [ "$ssh_status" -eq 0 ]; then
              exit 0
            fi
            if [ "$ssh_status" -ne 255 ]; then
              echo "Remote rollout failed with status $ssh_status; not retrying an application failure" >&2
              exit "$ssh_status"
            fi
            echo "SSH transport attempt ${attempt}/3 failed; reconciling durable remote state" >&2
            set +e
            bash .github/scripts/reconcile-rollout.sh | tee -a "$deploy_log"
            reconcile_status="${PIPESTATUS[0]}"
            set -e
            case "$reconcile_status" in
              0) exit 0 ;;
              10)
                echo "Remote rollout never started; retry is safe" >&2
                [ "$attempt" -lt 3 ] && sleep 15
                ;;
              *)
                echo "Remote rollout state is failed or ambiguous; refusing to replay" >&2
                exit 1
                ;;
            esac
          done
          exit 1
      - name: Notify deployment success
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DEPLOY_IMAGE: ${{ needs.deploy-preflight.outputs.release_image }}
          PREVIOUS_IMAGE: ${{ needs.deploy-preflight.outputs.previous_image }}
        run: bash .github/scripts/notify-deploy.sh success
      - name: Notify deployment failure and rollback result
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DEPLOY_IMAGE: ${{ needs.deploy-preflight.outputs.release_image }}
          PREVIOUS_IMAGE: ${{ needs.deploy-preflight.outputs.previous_image }}
          DEPLOY_LOG_FILE: ${{ steps.rollout.outputs.log_file }}
        run: bash .github/scripts/notify-deploy.sh failure
      - name: Post-deployment summary
        if: always()
        env:
          DEPLOY_STATUS: ${{ job.status }}
          DEPLOY_IMAGE: ${{ needs.deploy-preflight.outputs.release_image }}
          PREVIOUS_IMAGE: ${{ needs.deploy-preflight.outputs.previous_image }}
          MIGRATIONS: ${{ needs.deploy-preflight.outputs.migrations }}
        run: |
          {
            echo "## Rollout result"
            echo
            echo "| Signal | Value |"
            echo "|---|---|"
            echo "| Status | $DEPLOY_STATUS |"
            echo "| Release image | \`$DEPLOY_IMAGE\` |"
            echo "| Previous image | \`${PREVIOUS_IMAGE:-none}\` |"
            echo "| Migrations | \`${MIGRATIONS:-none}\` |"
            echo "| Sustained gate | immediate + short-term + medium-term |"
            echo
            echo "Post-deployment follow-up: review error rates, latency, container restarts, and business-critical API behavior at 1h and 24h."
          } >> "$GITHUB_STEP_SUMMARY"
