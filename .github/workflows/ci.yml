name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: Deploy this commit or roll back to an existing SHA image
        type: choice
        options: [deploy, rollback]
        default: deploy
      image_sha:
        description: Full 40-character image commit SHA (required for rollback)
        type: string
        required: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  IMAGE_REPOSITORY: ghcr.io/panyakorn04/portfolio-backend-2026

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        run: |
          set -euo pipefail
          test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }
      - name: Vet
        run: go vet ./...
      - name: Test with race detector
        run: go test ./... -race -count=1 -shuffle=on
      - name: Validate deploy script
        run: bash -n deploy/deploy-compose-service.sh .github/scripts/smoke-test-image.sh

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          args: --timeout=5m

  image:
    if: github.event_name != 'workflow_dispatch' || inputs.action != 'rollback'
    needs: [validate, lint]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          load: ${{ github.event_name == 'pull_request' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.IMAGE_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test exact image
        run: bash .github/scripts/smoke-test-image.sh "${IMAGE_REPOSITORY}:${GITHUB_SHA}"

  deploy:
    if: >-
      always() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main' &&
      needs.validate.result == 'success' && needs.lint.result == 'success' &&
      (needs.image.result == 'success' || (github.event_name == 'workflow_dispatch' && inputs.action == 'rollback' && needs.image.result == 'skipped'))
    needs: [validate, lint, image]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Select immutable image
        id: release
        env:
          REQUESTED_SHA: ${{ inputs.image_sha }}
          ACTION: ${{ inputs.action }}
        run: |
          set -euo pipefail
          sha="$GITHUB_SHA"
          if [ "${ACTION:-deploy}" = rollback ]; then sha="$REQUESTED_SHA"; fi
          [[ "$sha" =~ ^[0-9a-f]{40}$ ]] || { echo "image_sha must be a full lowercase 40-character commit SHA" >&2; exit 1; }
          echo "image=${IMAGE_REPOSITORY}:${sha}" >> "$GITHUB_OUTPUT"
      - name: Prepare pinned SSH host identity
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          test -s ~/.ssh/known_hosts
      - name: Deploy and health-gate
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_IMAGE: ${{ steps.release.outputs.image }}
        run: |
          set -euo pipefail
          remote_env=$(printf 'DEPLOY_IMAGE=%q IMAGE_VARIABLE=%q SERVICE=%q HEALTH_URL=%q COMPOSE_FILES=%q GHCR_USERNAME=%q' "$DEPLOY_IMAGE" BACKEND_IMAGE backend https://api.panyakorn.com/api/ready 'docker-compose.yml docker-compose.ai-skills.yml docker-compose.studio.yml' "$GHCR_USERNAME")
          for attempt in 1 2 3; do
            if { printf '%s\n' "$GHCR_TOKEN"; cat deploy/deploy-compose-service.sh; } | ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=60 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 "${VPS_USER}@${VPS_HOST}" "IFS= read -r GHCR_TOKEN; export GHCR_TOKEN; ${remote_env} bash -se"; then
              exit 0
            fi
            echo "SSH deployment attempt ${attempt}/3 failed" >&2
            sleep 15
          done
          exit 1
