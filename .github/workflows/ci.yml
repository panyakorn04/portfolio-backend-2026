name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/panyakorn04/portfolio-backend-2026:latest

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Verify gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -race -count=1

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  docker:
    name: Docker build and publish
    runs-on: ubuntu-latest
    needs:
      - build-and-test
      - lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_NAME }}
            ghcr.io/panyakorn04/portfolio-backend-2026:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs:
      - docker
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy backend service
        uses: appleboy/ssh-action@v1.0.3
        env:
          BACKEND_IMAGE: ${{ secrets.BACKEND_IMAGE || env.IMAGE_NAME }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          REDIS_URL: ${{ vars.REDIS_URL }}
          ARTICLE_CACHE_TTL_SECONDS: ${{ vars.ARTICLE_CACHE_TTL_SECONDS }}
          CONTACT_WEBHOOK_URL: ${{ vars.CONTACT_WEBHOOK_URL }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}
          OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}
          OLLAMA_ALLOWED_MODELS: ${{ vars.OLLAMA_ALLOWED_MODELS }}
          AI_SKILLS_DIR: ${{ vars.AI_SKILLS_DIR || '/opt/ai/skills' }}
          PORTFOLIO_CHAT_SESSION_TTL_HOURS: ${{ vars.PORTFOLIO_CHAT_SESSION_TTL_HOURS }}
          PORTFOLIO_CHAT_MAX_STORED_MESSAGES: ${{ vars.PORTFOLIO_CHAT_MAX_STORED_MESSAGES }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CONTACT_WEBHOOK_SECRET: ${{ secrets.CONTACT_WEBHOOK_SECRET }}
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          PORTFOLIO_CHAT_VISITOR_SECRET: ${{ secrets.PORTFOLIO_CHAT_VISITOR_SECRET }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: BACKEND_IMAGE,GHCR_USERNAME,GHCR_TOKEN,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SITE_URL,REDIS_URL,ARTICLE_CACHE_TTL_SECONDS,CONTACT_WEBHOOK_URL,AI_PROVIDER,OLLAMA_BASE_URL,OLLAMA_MODEL,OLLAMA_ALLOWED_MODELS,AI_SKILLS_DIR,PORTFOLIO_CHAT_SESSION_TTL_HOURS,PORTFOLIO_CHAT_MAX_STORED_MESSAGES,NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY,SUPABASE_SERVICE_ROLE_KEY,CONTACT_WEBHOOK_SECRET,ADMIN_API_TOKEN,INTERNAL_API_TOKEN,AI_API_KEY,PORTFOLIO_CHAT_VISITOR_SECRET
          script: |
            set -euo pipefail
            cd /opt/apps

            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "${GHCR_USERNAME:-panyakorn04}" --password-stdin
            fi

            if [ -f .env ]; then
              cp .env ".env.backup.$(date +%Y%m%d%H%M%S)"
            fi

            python3 - <<'PY'
            import os
            from pathlib import Path

            env_path = Path('.env')
            managed_keys = [
                'BACKEND_IMAGE',
                'NEXT_PUBLIC_SUPABASE_URL',
                'NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY',
                'SUPABASE_SERVICE_ROLE_KEY',
                'NEXT_PUBLIC_SITE_URL',
                'REDIS_URL',
                'ARTICLE_CACHE_TTL_SECONDS',
                'CONTACT_WEBHOOK_URL',
                'CONTACT_WEBHOOK_SECRET',
                'ADMIN_API_TOKEN',
                'INTERNAL_API_TOKEN',
                'AI_PROVIDER',
                'AI_API_KEY',
                'OLLAMA_BASE_URL',
                'OLLAMA_MODEL',
                'OLLAMA_ALLOWED_MODELS',
                'AI_SKILLS_DIR',
                'PORTFOLIO_CHAT_VISITOR_SECRET',
                'PORTFOLIO_CHAT_SESSION_TTL_HOURS',
                'PORTFOLIO_CHAT_MAX_STORED_MESSAGES',
            ]

            existing = {}
            preserved = []
            if env_path.exists():
                for line in env_path.read_text().splitlines():
                    stripped = line.strip()
                    if not stripped or stripped.startswith('#') or '=' not in line:
                        preserved.append(line)
                        continue
                    key, value = line.split('=', 1)
                    key = key.strip()
                    if key in managed_keys:
                        existing[key] = value
                    else:
                        preserved.append(line)

            values = {}
            missing = []
            for key in managed_keys:
                incoming = os.environ.get(key, '')
                if incoming != '':
                    values[key] = incoming.replace('\n', '')
                else:
                    values[key] = existing.get(key, '')
                    if values[key] == '' and key in {
                        'NEXT_PUBLIC_SUPABASE_URL',
                        'NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY',
                        'SUPABASE_SERVICE_ROLE_KEY',
                    }:
                        missing.append(key)

            lines = [
                '# Managed by GitHub Actions deploy. Repo variables/secrets are primary;',
                '# existing VPS values are preserved when a GitHub value is empty.',
            ]
            lines += [f'{key}={values[key]}' for key in managed_keys]
            if preserved:
                lines += ['', '# Preserved unmanaged values from the previous VPS .env']
                lines += preserved
            env_path.write_text('\n'.join(lines) + '\n')

            if missing:
                print('WARNING: missing required app env values: ' + ', '.join(missing), flush=True)
            PY

            cat > docker-compose.ai-skills.yml <<'YAML'
            services:
              backend:
                environment:
                  AI_SKILLS_DIR: ${AI_SKILLS_DIR:-/opt/ai/skills}
                volumes:
                  - ./ai:/opt/ai:ro
            YAML

            BACKEND_IMAGE="$BACKEND_IMAGE" docker compose -f docker-compose.yml -f docker-compose.ai-skills.yml pull backend
            BACKEND_IMAGE="$BACKEND_IMAGE" docker compose -f docker-compose.yml -f docker-compose.ai-skills.yml up -d backend

            if [ -n "${OLLAMA_ALLOWED_MODELS:-}" ]; then
              IFS=',' read -ra allowed_models <<< "$OLLAMA_ALLOWED_MODELS"
              for raw_model in "${allowed_models[@]}"; do
                model="$(printf '%s' "$raw_model" | xargs)"
                if [ -z "$model" ]; then
                  continue
                fi
                echo "Ensuring Ollama model is available: $model"
                if ! docker compose exec -T ollama ollama pull "$model"; then
                  echo "WARNING: could not pull $model; it may be a locally-created model or unavailable from Ollama library."
                fi
              done
            fi

            docker image prune -f
