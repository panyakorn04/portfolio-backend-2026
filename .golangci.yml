version: "2"
linters:
  enable:
    - misspell
    - unconvert
  settings:
    staticcheck:
      checks:
        - all
        # Preserve established API/config names and user-facing validation messages.
        - -ST1003
        - -ST1005
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Generated/boilerplate noise is not worth failing CI over.
      - path: cmd/createuser/main.go
        linters:
          - errcheck
      # go-zero config uses json tag options such as `optional`, which are parsed
      # by go-zero but reported as unknown by staticcheck's encoding/json check.
      - path: internal/config/config.go
        linters:
          - staticcheck
        text: "SA5008:"
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
