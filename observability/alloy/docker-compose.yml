services:
  grafana-alloy:
    image: grafana/alloy:v1.17.1@sha256:4f6ddc56ffdcf8a6316748fc5162972e20cb301523cac1bb4a31957df733ae9b
    container_name: grafana-alloy
    command:
      - run
      - --storage.path=/tmp/alloy-data
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      GRAFANA_LOKI_URL: ${GRAFANA_LOKI_URL:?GRAFANA_LOKI_URL is required}
      GRAFANA_LOKI_USERNAME: ${GRAFANA_LOKI_USERNAME:?GRAFANA_LOKI_USERNAME is required}
      GRAFANA_LOKI_TOKEN: ${GRAFANA_LOKI_TOKEN:?GRAFANA_LOKI_TOKEN is required}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config.alloy:/etc/alloy/config.alloy:ro
    ports:
      - 127.0.0.1:12345:12345
    tmpfs:
      - /tmp:size=16m,mode=1777
