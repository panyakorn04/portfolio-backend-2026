# Runs the go-zero API against the database configured in .env
# (the existing Supabase instance).
#
#   docker compose up --build
#
# The API reads DATABASE_URL and other settings from .env (gitignored).
# No local Postgres is started — the schema already lives in Supabase.

services:
  api:
    build: .
    env_file:
      - .env
    environment:
      # Allow overriding without editing .env; falls back to .env values.
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    ports:
      - "8888:8888"
